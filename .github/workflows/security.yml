name: Security Audit
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        if: hashFiles('Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        if: hashFiles('Cargo.toml') != ''
        run: cargo install cargo-audit
      - name: Run audit
        if: hashFiles('Cargo.toml') != ''
        run: cargo audit
  
  clippy-security:
    name: Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        if: hashFiles('Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install SARIF tools
        if: hashFiles('Cargo.toml') != ''
        run: cargo install clippy-sarif sarif-fmt
      - name: Clippy SARIF
        if: hashFiles('Cargo.toml') != ''
        run: >
          cargo clippy --all-targets --all-features --message-format=json
          | clippy-sarif
          | tee results.sarif
          | sarif-fmt
        continue-on-error: true
      - name: Upload SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  
  mojo-security:
    name: Mojo Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Modular CLI
        if: hashFiles('**/*.mojo', '**/*.moj') != ''
        run: |
          curl -s https://get.modular.com | sh -
          echo "$HOME/.modular/bin" >> $GITHUB_PATH
          modular auth ${{ secrets.MODULAR_AUTH_TOKEN }}
      - name: Install Mojo
        if: hashFiles('**/*.mojo', '**/*.moj') != ''
        run: modular install mojo
      - name: Static Analysis
        if: hashFiles('**/*.mojo', '**/*.moj') != ''
        run: mojo check .

  
  lean-audit:
    name: Lean Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup elan
        if: hashFiles('lakefile.toml', 'lakefile.lean') != ''
        uses: leanprover/lean-action@v1
      - name: Check lake-manifest integrity
        if: hashFiles('lakefile.toml', 'lakefile.lean') != ''
        run: lake resolve-deps
      - name: Verify proof consistency
        if: hashFiles('lakefile.toml', 'lakefile.lean') != ''
        run: lake build
