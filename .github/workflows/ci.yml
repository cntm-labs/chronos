name: "CI for chronos"
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        if: hashFiles('Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        if: hashFiles('Cargo.toml') != ''
        run: cargo fmt --all --check
      - name: Clippy
        if: hashFiles('Cargo.toml') != ''
        run: cargo clippy --all-targets --all-features -- -D warnings
  
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        if: hashFiles('Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        if: hashFiles('Cargo.toml') != ''
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        if: hashFiles('Cargo.toml') != ''
        run: cargo build
      - name: Test
        if: hashFiles('Cargo.toml') != ''
        run: cargo test

  
  mojo-build:
    name: Mojo Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Modular CLI
        if: hashFiles('**/*.mojo', '**/*.moj') != ''
        run: |
          curl -s https://get.modular.com | sh -
          echo "$HOME/.modular/bin" >> $GITHUB_PATH
          modular auth ${{ secrets.MODULAR_AUTH_TOKEN }}
      - name: Install Mojo
        if: hashFiles('**/*.mojo', '**/*.moj') != ''
        run: modular install mojo
      - name: Build
        if: hashFiles('**/*.mojo', '**/*.moj') != ''
        run: mojo build .
      - name: Test
        if: hashFiles('**/*.mojo', '**/*.moj') != ''
        run: mojo test .

  
  lean-build:
    name: Lean Build & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup elan (Lean toolchain manager)
        if: hashFiles('lakefile.toml', 'lakefile.lean') != ''
        uses: leanprover/lean-action@v1
      - name: Build
        if: hashFiles('lakefile.toml', 'lakefile.lean') != ''
        run: lake build
      - name: Test
        if: hashFiles('lakefile.toml', 'lakefile.lean') != ''
        run: lake test
      - name: Check proofs
        if: hashFiles('lakefile.toml', 'lakefile.lean') != ''
        run: lake env lean --run Mathlib.Tactic.Check

  
  cuda-test:
    name: CUDA Build & Test
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.4.1-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify CUDA
        run: nvidia-smi || echo "No GPU available — compile-only mode"
      - name: Install build tools
        run: apt-get update && apt-get install -y build-essential cmake
      - name: Build CUDA kernels
        run: |
          if [ -d "cuda/" ]; then
            cd cuda && cmake -B build && cmake --build build
          else
            echo "No cuda/ directory found — skipping"
          fi
